<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานผลการเรียน - คุณครู</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 50%, #dbe6f6 100%);
            min-height: 100vh;
            color: #2c3e50;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2563a8 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1a3350;
            box-shadow: 0 4px 20px rgba(30,58,95,0.3);
        }
        .header h1 { color: white; font-size: 1.4em; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .header .actions { display: flex; gap: 10px; }
        .btn {
            padding: 10px 20px; border: none; border-radius: 12px;
            cursor: pointer; font-family: 'Kanit', sans-serif;
            font-weight: 600; font-size: 0.95em; transition: all 0.3s ease;
        }
        .btn-secondary { background: rgba(255,255,255,0.25); color: white; border: 1px solid rgba(255,255,255,0.5); }
        .btn-secondary:hover { background: rgba(255,255,255,0.4); }
        .btn-print { background: #667eea; color: white; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 0.9em; }
        .btn-print:hover { background: #5a6fd6; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card {
            background: linear-gradient(135deg, #2563a8 0%, #1e3a5f 100%);
            border-radius: 20px; padding: 20px 25px; flex: 1; min-width: 140px;
            border: 1px solid rgba(37,99,168,0.3); text-align: center; color: white;
            box-shadow: 0 6px 20px rgba(30,58,95,0.25);
        }
        .stat-card .num { font-size: 2.2em; font-weight: 900; }
        .stat-card .label { font-size: 0.9em; opacity: 0.85; margin-top: 5px; }

        .card {
            background: white; border-radius: 24px; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin-bottom: 30px;
        }
        .card h2 { font-size: 1.3em; margin-bottom: 20px; color: #2c3e50; }

        .student-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .student-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #eef1ff 100%);
            border-radius: 16px; padding: 18px; cursor: pointer;
            border: 2px solid transparent; transition: all 0.3s ease;
        }
        .student-card:hover {
            transform: translateY(-3px); border-color: #2563a8;
            box-shadow: 0 8px 24px rgba(37,99,168,0.2);
        }
        .student-card .sc-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .student-card .sc-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            border: 2px solid #f4b235; object-fit: cover;
        }
        .student-card .sc-name { font-weight: 700; font-size: 1em; }
        .student-card .sc-user { font-size: 0.8em; color: #888; }
        .progress-bar { height: 8px; background: #e0e7ff; border-radius: 10px; overflow: hidden; }
        .progress-bar .fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .progress-bar .fill.good { background: linear-gradient(90deg, #4fb848, #7fb83e); }
        .progress-bar .fill.mid { background: linear-gradient(90deg, #f4b235, #f39c12); }
        .progress-bar .fill.low { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .sc-stats { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8em; color: #666; }

        /* Detail Overlay */
        .detail-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            z-index: 1000; justify-content: center; align-items: flex-start;
            padding-top: 20px; overflow-y: auto;
        }
        .detail-overlay.active { display: flex; }
        .detail-box {
            background: #f5f5ff; border-radius: 24px; padding: 30px;
            max-width: 850px; width: 95%; max-height: 92vh; overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Profile Card */
        .profile-card {
            background: white; border-radius: 20px; padding: 25px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .profile-card .avatar {
            width: 70px; height: 70px; border-radius: 50%;
            border: 3px solid #f4b235; object-fit: cover;
        }
        .profile-info { flex: 1; }
        .profile-info .pname { font-weight: 900; font-size: 1.3em; }
        .profile-info .pmeta { font-size: 0.85em; color: #888; line-height: 1.6; }
        .profile-info .pmeta span { margin-right: 15px; }
        .profile-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .close-btn {
            background: #f0f0f0; border: none; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; font-size: 1.3em; transition: all 0.3s;
        }
        .close-btn:hover { background: #ff6b6b; color: white; transform: rotate(90deg); }

        /* Score Summary */
        .score-summary {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .sc-box {
            background: white; text-align: center; padding: 18px 12px;
            border-radius: 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.06);
        }
        .sc-box .sc-val { font-size: 1.8em; font-weight: 900; }
        .sc-box .sc-lbl { font-size: 0.78em; color: #888; margin-top: 3px; }
        .sc-box.correct .sc-val { color: #4fb848; }
        .sc-box.wrong .sc-val { color: #ff6b6b; }
        .sc-box.pct .sc-val { color: #667eea; }
        .sc-box.plays .sc-val { color: #f4b235; }

        /* Performance Level */
        .perf-badge {
            display: inline-block; padding: 10px 24px; border-radius: 16px;
            font-size: 1.1em; font-weight: 700; margin-bottom: 20px;
        }
        .perf-excellent { background: linear-gradient(135deg, #4fb848, #7fb83e); color: white; }
        .perf-good { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .perf-improve { background: linear-gradient(135deg, #f4b235, #f39c12); color: white; }
        .perf-needhelp { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; }

        /* Donut Chart */
        .donut-chart { display: flex; align-items: center; gap: 30px; justify-content: center; margin-bottom: 20px; }
        .donut-svg { width: 150px; height: 150px; }
        .donut-label { font-size: 0.9em; }
        .donut-label div { margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .donut-label .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }

        /* Word Chart */
        .chart-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
        .chart-section h4 { margin-bottom: 15px; font-size: 1.05em; }
        .word-bars { display: flex; flex-direction: column; gap: 6px; }
        .word-bar-row { display: flex; align-items: center; gap: 8px; font-size: 0.85em; }
        .word-bar-label { width: 80px; text-align: right; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .word-bar-track { flex: 1; height: 22px; background: #f0f0f0; border-radius: 6px; overflow: hidden; display: flex; }
        .word-bar-correct { background: #4fb848; height: 100%; transition: width 0.5s; }
        .word-bar-wrong { background: #ff6b6b; height: 100%; transition: width 0.5s; }
        .word-bar-count { width: 70px; font-size: 0.75em; color: #888; }

        /* Level sections */
        .level-section { margin-bottom: 15px; }
        .level-title {
            font-weight: 700; font-size: 0.95em; padding: 8px 15px;
            background: linear-gradient(90deg, #1e3a5f, #2563a8);
            color: white; border-radius: 10px; margin-bottom: 8px; cursor: pointer;
        }
        .level-title:hover { opacity: 0.9; }
        .word-row {
            display: flex; align-items: center; gap: 10px; padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0; font-size: 0.88em; background: white;
        }
        .word-row:last-child { border-bottom: none; }
        .word-status { font-size: 1.1em; }
        .word-detail { flex: 1; }
        .word-error { color: #ff6b6b; font-size: 0.78em; }
        .word-date { color: #aaa; font-size: 0.72em; text-align: right; min-width: 80px; }
        .level-words { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        /* History Chart */
        .history-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
        .history-bars { display: flex; gap: 3px; align-items: flex-end; height: 80px; padding: 10px 0; }
        .history-bar { flex: 1; min-width: 6px; border-radius: 3px 3px 0 0; }
        .history-bar.correct { background: #4fb848; }
        .history-bar.wrong { background: #ff6b6b; }
        .history-dates { display: flex; gap: 3px; font-size: 0.55em; color: #aaa; }
        .history-dates span { flex: 1; text-align: center; min-width: 6px; }
        .legend { display: flex; gap: 15px; margin-top: 10px; font-size: 0.8em; color: #666; }
        .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

        /* Level Progress Bar */
        .level-progress-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 3px 12px rgba(0,0,0,0.06); }
        .level-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85em; }
        .level-prog-label { width: 60px; font-weight: 700; }
        .level-prog-bar { flex: 1; height: 18px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .level-prog-fill { height: 100%; border-radius: 8px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.5s; }
        .level-prog-val { width: 50px; text-align: right; font-weight: 600; color: #667eea; }

        .search-bar {
            padding: 10px 18px; border: 2px solid #e0e7ff; border-radius: 12px;
            font-family: 'Kanit', sans-serif; font-size: 0.95em; width: 100%;
            max-width: 350px; margin-bottom: 20px;
        }
        .search-bar:focus { outline: none; border-color: #e85d9e; }

        @media (max-width: 768px) {
            .student-list { grid-template-columns: 1fr; }
            .score-summary { grid-template-columns: repeat(2, 1fr); }
            .profile-card { flex-direction: column; text-align: center; }
        }

        /* Print Styles */
        @media print {
            body { background: white !important; color: black !important; }
            .header, .search-bar, .student-list, .close-btn, .btn-print, .detail-overlay { display: none !important; }
            .detail-box { box-shadow: none !important; max-height: none !important; overflow: visible !important; }
            .profile-actions { display: none !important; }
            .chart-section, .history-section, .level-progress-section, .sc-box, .profile-card, .score-summary { box-shadow: none !important; border: 1px solid #ddd !important; }
            .level-words { display: block !important; }
            .perf-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .word-bar-correct, .word-bar-wrong, .history-bar, .level-prog-fill, .progress-bar .fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #printArea { display: block !important; padding: 20px; }
        }
        #printArea { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 รายงานผลการเรียน</h1>
        <div class="actions">
            <button class="btn btn-secondary" onclick="recalculateScores()" id="recalcBtn" style="background:#4fb848;border-color:#4fb848;">🔄 คำนวณคะแนนใหม่</button>
            <button class="btn btn-secondary" onclick="logout()">🚪 ออกจากระบบ</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-row">
            <div class="stat-card">
                <div class="num" id="sTotal">-</div>
                <div class="label">นักเรียนทั้งหมด</div>
            </div>
            <div class="stat-card">
                <div class="num" id="sAvgScore">-</div>
                <div class="label">คะแนนเฉลี่ย</div>
            </div>
            <div class="stat-card">
                <div class="num" id="sAvgLevel">-</div>
                <div class="label">ด่านเฉลี่ย</div>
            </div>
            <div class="stat-card">
                <div class="num" id="sPassRate">-</div>
                <div class="label">ผ่านเกณฑ์ (%)</div>
            </div>
            <div class="stat-card">
                <div class="num" id="sTopScore">-</div>
                <div class="label">คะแนนสูงสุด</div>
            </div>
            <div class="stat-card">
                <div class="num" id="sAvgAccuracy">-</div>
                <div class="label">ความแม่นยำเฉลี่ย</div>
            </div>
        </div>

        <div class="card">
            <h2>👨‍🎓 รายชื่อนักเรียน</h2>
            <input type="text" class="search-bar" id="searchInput" placeholder="🔍 ค้นหานักเรียน..." oninput="filterStudents()">
            <div class="student-list" id="studentList">
                <p style="text-align:center;padding:40px;color:#888;">กำลังโหลด...</p>
            </div>
        </div>
    </div>

    <!-- Teacher Footer -->
    <div style="text-align:center;padding:20px;color:#1e3a5f;font-size:0.9em;opacity:0.7;">
        <span>ผู้ดูรายงาน: </span><span id="teacherName" style="font-weight:700;">-</span>
        <span style="margin-left:15px;">เวลาเข้าสู่ระบบ: <span id="loginTime">-</span></span>
    </div>

    <!-- Student Detail Overlay -->
    <div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
        <div class="detail-box" id="detailBox">
            <div id="detailContent"><p style="text-align:center;padding:40px;">กำลังโหลด...</p></div>
        </div>
    </div>

    <!-- Print Area (hidden, used for printing) -->
    <div id="printArea"></div>

    <script src="js/api.js?v=20260313d"></script>
    <script>
        const characterImages = { 1:'01.jpg', 2:'02.jpg', 3:'03.jpg', 4:'04.jpg', 5:'05.jpg', 6:'06.jpg' };
        const MAX_SCORE = 100; // 100 คำ (10 ด่าน × 10 คำ = 100%)
        let allStudents = [];

        if (!localStorage.getItem('authToken')) {
            window.location.href = 'index1.html';
        }

        loadStudents();
        loadTeacherInfo();

        async function loadStudents() {
            try {
                allStudents = await gameAPI.getStudentsList();
                renderStudents(allStudents);
                updateOverview(allStudents);
            } catch (error) {
                if (error.message && (error.message.includes('สิทธิ์') || error.message.includes('403'))) {
                    document.getElementById('studentList').innerHTML = '<p style="color:#e85d9e;text-align:center;padding:40px;">คุณไม่มีสิทธิ์เข้าถึง</p>';
                    setTimeout(() => { window.location.href = 'index1.html'; }, 2000);
                }
            }
        }

        function updateOverview(students) {
            document.getElementById('sTotal').textContent = students.length;
            if (students.length > 0) {
                const avgScore = Math.round(students.reduce((s, st) => s + st.totalAnswered, 0) / students.length);
                const avgLevel = (students.reduce((s, st) => s + st.maxUnlocked, 0) / students.length).toFixed(1);
                const passCount = students.filter(st => (st.totalAnswered / MAX_SCORE * 100) >= 60).length;
                const passRate = Math.round((passCount / students.length) * 100);
                const topScore = Math.max(...students.map(st => st.totalAnswered));
                const avgAccuracy = Math.round(students.reduce((s, st) => s + Math.min((st.totalAnswered / MAX_SCORE * 100), 100), 0) / students.length);
                document.getElementById('sAvgScore').textContent = avgScore;
                document.getElementById('sAvgLevel').textContent = avgLevel;
                document.getElementById('sPassRate').textContent = passRate + '%';
                document.getElementById('sTopScore').textContent = topScore;
                document.getElementById('sAvgAccuracy').textContent = avgAccuracy + '%';
            }
        }

        function getPerformanceLevel(pct) {
            if (pct >= 80) return { label: '⭐ ดีมาก', cls: 'perf-excellent' };
            if (pct >= 60) return { label: '👍 ดี', cls: 'perf-good' };
            if (pct >= 40) return { label: '⚠ ควรพัฒนา', cls: 'perf-improve' };
            return { label: '🔴 ต้องปรับปรุง', cls: 'perf-needhelp' };
        }

        function renderStudents(students) {
            const container = document.getElementById('studentList');
            if (students.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">ไม่พบนักเรียน</p>';
                return;
            }
            container.innerHTML = students.map(st => {
                const pct = Math.min(Math.round((st.totalAnswered / MAX_SCORE) * 100), 100);
                const fillClass = pct >= 60 ? 'good' : pct >= 40 ? 'mid' : 'low';
                const avatarSrc = `css/${characterImages[st.characterId] || '01.jpg'}`;
                const lastLogin = st.lastLoginAt ? new Date(st.lastLoginAt).toLocaleDateString('th-TH', { day:'numeric', month:'short' }) : '-';
                const classInfo = st.classroom ? ` | ${st.classroom}` : '';
                const sidInfo = st.studentId ? `${st.studentId} | ` : '';
                return `<div class="student-card" onclick="showDetail('${st.id}')">
                    <div class="sc-header">
                        <img src="${avatarSrc}" class="sc-avatar" onerror="this.src='css/01.jpg'">
                        <div>
                            <div class="sc-name">${st.displayName}</div>
                            <div class="sc-user">${sidInfo}${st.username}${classInfo}</div>
                        </div>
                    </div>
                    <div class="progress-bar"><div class="fill ${fillClass}" style="width:${pct}%"></div></div>
                    <div class="sc-stats">
                        <span>ตอบถูก ${st.totalAnswered}/${MAX_SCORE} คำ (${pct}%)</span>
                        <span>ด่าน ${st.maxUnlocked}/10</span>
                        <span>${lastLogin}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function filterStudents() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allStudents.filter(s =>
                s.username.toLowerCase().includes(q) ||
                s.displayName.toLowerCase().includes(q) ||
                (s.studentId && s.studentId.toLowerCase().includes(q)) ||
                (s.classroom && s.classroom.toLowerCase().includes(q))
            );
            renderStudents(filtered);
        }

        async function showDetail(studentId) {
            document.getElementById('detailOverlay').classList.add('active');
            document.getElementById('detailContent').innerHTML = '<p style="text-align:center;padding:40px;">กำลังโหลด...</p>';

            try {
                const [detail, history] = await Promise.all([
                    gameAPI.getStudentDetail(studentId),
                    gameAPI.getStudentHistory(studentId)
                ]);

                const s = detail.student;
                const avatarSrc = `css/${characterImages[s.characterId] || '01.jpg'}`;
                const joinDate = new Date(s.createdAt).toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
                const lastLogin = s.lastLoginAt ? new Date(s.lastLoginAt).toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '-';
                const dailyKeys = Object.keys(history.dailyStats || {});
                const totalPlayDays = dailyKeys.length;

                let html = '';

                // คำนวณจำนวนคำที่ตอบถูกจาก Progress.answeredWords (แหล่งข้อมูลหลัก)
                const progressAW = detail.progress?.answeredWords || {};
                let totalAnsweredWords = 0;
                for (const key of Object.keys(progressAW)) {
                    if (Array.isArray(progressAW[key])) totalAnsweredWords += progressAW[key].length;
                }
                // ใช้จำนวนคำที่ตอบถูกจาก Progress เป็นหลัก
                const realPct = Math.min(Math.round((totalAnsweredWords / MAX_SCORE) * 100), 100);
                const perf = getPerformanceLevel(realPct);

                // ===== Profile Card + Print Button =====
                html += `<div class="profile-card">
                    <img src="${avatarSrc}" class="avatar" onerror="this.src='css/01.jpg'">
                    <div class="profile-info">
                        <div class="pname">${s.displayName}</div>
                        <div class="pmeta">
                            ${s.studentId ? `<span>🆔 ${s.studentId}</span>` : ''}
                            <span>👤 ${s.username}</span>
                            ${s.classroom ? `<span>🏫 ${s.classroom}</span>` : ''}
                        </div>
                        <div class="pmeta">
                            <span>📅 สมัคร: ${joinDate}</span>
                            <span>🕐 เล่นล่าสุด: ${lastLogin}</span>
                        </div>
                        <div class="pmeta">
                            <span>🎮 เล่นทั้งหมด ${totalPlayDays} วัน</span>
                            <span>📊 ทำแบบทดสอบ ${detail.stats.totalAttempts} ครั้ง</span>
                        </div>
                    </div>
                    <div class="profile-actions">
                        <button class="close-btn" onclick="closeDetail()">✕</button>
                        <button class="btn-print" onclick="printReport()">🖨️ ปริ้นผล</button>
                    </div>
                </div>`;

                // ===== Performance Badge =====
                html += `<div style="text-align:center;margin-bottom:20px;">
                    <div class="perf-badge ${perf.cls}">${perf.label}</div>
                    <div style="font-size:0.85em;color:#888;margin-top:5px;">ตอบถูก ${totalAnsweredWords}/${MAX_SCORE} คำ คิดเป็น ${realPct}%</div>
                    <div style="font-size:0.75em;color:#aaa;margin-top:3px;">💡 100% = ตอบถูกครบ 100 คำ (10 ด่าน × 10 คำ)</div>
                </div>`;

                // ===== Score Summary — จาก Progress.answeredWords =====
                const progCorrectByLevel = {};
                for (const key of Object.keys(progressAW)) {
                    if (Array.isArray(progressAW[key])) progCorrectByLevel[key] = progressAW[key].length;
                }
                html += `<div class="score-summary">
                    <div class="sc-box correct"><div class="sc-val">${totalAnsweredWords}</div><div class="sc-lbl">ตอบถูก (คำ)</div></div>
                    <div class="sc-box wrong"><div class="sc-val">${MAX_SCORE - totalAnsweredWords}</div><div class="sc-lbl">ยังไม่ได้ตอบ</div></div>
                    <div class="sc-box pct"><div class="sc-val">${realPct}%</div><div class="sc-lbl">ความก้าวหน้า</div></div>
                    <div class="sc-box plays"><div class="sc-val">${detail.stats.totalAttempts}</div><div class="sc-lbl">ทำแบบทดสอบ</div></div>
                </div>`;

                // ===== Donut Chart (ตอบถูกแล้ว / ยังไม่ได้ตอบ) =====
                const answered = totalAnsweredWords;
                const notAnswered = MAX_SCORE - answered;
                const answeredPct = (answered / MAX_SCORE) * 100;
                const answeredDash = (answeredPct / 100) * 251.2;
                html += `<div class="chart-section">
                    <h4>🎯 ความก้าวหน้าการตอบคำ</h4>
                    <div class="donut-chart">
                        <svg class="donut-svg" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="40" fill="none" stroke="#f0f0f0" stroke-width="12"/>
                            <circle cx="50" cy="50" r="40" fill="none" stroke="#4fb848" stroke-width="12"
                                stroke-dasharray="${answeredDash} ${251.2 - answeredDash}" stroke-dashoffset="62.8"
                                stroke-linecap="round" style="transition:all 0.5s;"/>
                            <text x="50" y="48" text-anchor="middle" font-size="14" font-weight="900" fill="#2c3e50">${realPct}%</text>
                            <text x="50" y="60" text-anchor="middle" font-size="6" fill="#888">ตอบถูกแล้ว</text>
                        </svg>
                        <div class="donut-label">
                            <div><span class="dot" style="background:#4fb848;"></span> ตอบถูกแล้ว ${answered} คำ (${realPct}%)</div>
                            <div><span class="dot" style="background:#f0f0f0;border:1px solid #ddd;"></span> ยังไม่ได้ตอบ ${notAnswered} คำ (${100 - realPct}%)</div>
                            <div><span class="dot" style="background:#667eea;"></span> ทั้งหมด ${MAX_SCORE} คำ</div>
                        </div>
                    </div>
                </div>`;

                // ===== Level Progress Bars =====
                html += `<div class="level-progress-section">
                    <h4>📈 ความก้าวหน้าแต่ละด่าน</h4>`;
                for (let level = 1; level <= 10; level++) {
                    const logs = detail.logsByLevel[String(level)];
                    if (!logs || logs.length === 0) {
                        html += `<div class="level-prog-row">
                            <div class="level-prog-label">ด่าน ${level}</div>
                            <div class="level-prog-bar"><div class="level-prog-fill" style="width:0%"></div></div>
                            <div class="level-prog-val">-</div>
                        </div>`;
                        continue;
                    }
                    const levelCorrect = logs.filter(l => l.isCorrect).length;
                    const levelPct = Math.round((levelCorrect / logs.length) * 100);
                    html += `<div class="level-prog-row">
                        <div class="level-prog-label">ด่าน ${level}</div>
                        <div class="level-prog-bar"><div class="level-prog-fill" style="width:${levelPct}%;background:${levelPct>=60?'linear-gradient(90deg,#4fb848,#7fb83e)':levelPct>=40?'linear-gradient(90deg,#f4b235,#f39c12)':'linear-gradient(90deg,#ff6b6b,#ee5a24)'}"></div></div>
                        <div class="level-prog-val">${levelPct}%</div>
                    </div>`;
                }
                html += `</div>`;

                // ===== Word Accuracy Chart =====
                const allLogs = [];
                for (const [lvl, logs] of Object.entries(detail.logsByLevel)) {
                    logs.forEach(l => allLogs.push({...l, level: lvl}));
                }
                const wordStats = {};
                allLogs.forEach(log => {
                    const key = log.word;
                    if (!wordStats[key]) wordStats[key] = { word: key, correct: 0, wrong: 0, total: 0 };
                    wordStats[key].total++;
                    if (log.isCorrect) wordStats[key].correct++;
                    else wordStats[key].wrong++;
                });
                const wordList = Object.values(wordStats).sort((a, b) => b.total - a.total);

                if (wordList.length > 0) {
                    const maxTotal = Math.max(...wordList.map(w => w.total));
                    html += `<div class="chart-section">
                        <h4>📊 คำที่ถูก/ผิดบ่อย (กลับมาเล่นซ้ำ)</h4>
                        <div class="word-bars">`;
                    wordList.forEach(w => {
                        const cPct = (w.correct / maxTotal) * 100;
                        const wPct = (w.wrong / maxTotal) * 100;
                        const replay = w.total > 1 ? `<span style="color:#f4b235;">🔄 ${w.total} ครั้ง</span>` : '';
                        html += `<div class="word-bar-row">
                            <div class="word-bar-label">${w.word}</div>
                            <div class="word-bar-track">
                                <div class="word-bar-correct" style="width:${cPct}%"></div>
                                <div class="word-bar-wrong" style="width:${wPct}%"></div>
                            </div>
                            <div class="word-bar-count">✅${w.correct} ❌${w.wrong} ${replay}</div>
                        </div>`;
                    });
                    html += `</div>
                        <div class="legend">
                            <span><span class="legend-dot" style="background:#4fb848;"></span>ถูก</span>
                            <span><span class="legend-dot" style="background:#ff6b6b;"></span>ผิด</span>
                            <span>🔄 = เล่นซ้ำหลายครั้ง</span>
                        </div>
                    </div>`;
                }

                // ===== Daily History Chart =====
                if (totalPlayDays > 0) {
                    const dates = dailyKeys.slice(-21);
                    const maxVal = Math.max(...dates.map(d => history.dailyStats[d].total), 1);
                    const barMinW = dates.length <= 3 ? '80px' : '6px';
                    const barGap = dates.length <= 3 ? '20px' : '3px';
                    html += `<div class="history-section">
                        <h4>📅 แนวโน้มการเล่นรายวัน (${totalPlayDays} วัน)</h4>
                        <div style="display:flex;gap:${barGap};align-items:flex-end;height:120px;padding:10px 0;">`;
                    dates.forEach(date => {
                        const stat = history.dailyStats[date];
                        const correctH = Math.max((stat.correct / maxVal) * 90, 8);
                        const wrongH = Math.max((stat.wrong / maxVal) * 90, stat.wrong > 0 ? 8 : 0);
                        const dl = new Date(date).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
                        html += `<div style="flex:1;min-width:${barMinW};display:flex;flex-direction:column;align-items:center;gap:2px;align-self:flex-end;">
                            <div style="font-size:0.75em;color:#4fb848;font-weight:700;">✅${stat.correct}</div>
                            <div style="width:100%;height:${correctH}px;background:#4fb848;border-radius:4px 4px 0 0;"></div>
                            ${wrongH > 0 ? `<div style="width:100%;height:${wrongH}px;background:#ff6b6b;border-radius:0 0 4px 4px;"></div><div style="font-size:0.75em;color:#ff6b6b;font-weight:700;">❌${stat.wrong}</div>` : ''}
                            <div style="font-size:0.7em;color:#888;margin-top:4px;">${dl}</div>
                        </div>`;
                    });
                    html += `</div>
                        <div class="legend" style="margin-top:10px;">
                            <span><span class="legend-dot" style="background:#4fb848;"></span>ถูก</span>
                            <span><span class="legend-dot" style="background:#ff6b6b;"></span>ผิด</span>
                        </div>
                    </div>`;
                }

                // ===== Detail Per Level =====
                html += `<div class="chart-section">
                    <h4>📝 รายละเอียดแต่ละด่าน (คลิกเพื่อดู)</h4>`;
                for (let level = 1; level <= 10; level++) {
                    const logs = detail.logsByLevel[String(level)];
                    if (!logs || logs.length === 0) continue;
                    const wordMap = {};
                    logs.forEach(log => {
                        if (!wordMap[log.word]) wordMap[log.word] = [];
                        wordMap[log.word].push(log);
                    });
                    const levelCorrect = logs.filter(l => l.isCorrect).length;
                    html += `<div class="level-section">
                        <div class="level-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
                            ด่านที่ ${level} — ✅ ${levelCorrect}/${logs.length} (${Math.round(levelCorrect/logs.length*100)}%)
                        </div>
                        <div class="level-words" style="display:none;">`;
                    for (const [word, attempts] of Object.entries(wordMap)) {
                        const latest = attempts[0];
                        const date = new Date(latest.playedAt).toLocaleDateString('th-TH', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
                        const correctCount = attempts.filter(a => a.isCorrect).length;
                        html += `<div class="word-row">
                            <span class="word-status">${latest.isCorrect ? '✅' : '❌'}</span>
                            <div class="word-detail">
                                <strong>${word}</strong>
                                ${latest.userAnswer !== word ? ` → ตอบ: <span style="color:#ff6b6b;">${latest.userAnswer}</span>` : ''}
                                ${!latest.isCorrect && latest.errorType ? `<div class="word-error">${latest.errorType}</div>` : ''}
                                <div style="font-size:0.73em;color:#aaa;">เล่น ${attempts.length} ครั้ง (ถูก ${correctCount})</div>
                            </div>
                            <span class="word-date">${date}</span>
                        </div>`;
                    }
                    html += '</div></div>';
                }
                if (Object.keys(detail.logsByLevel).length === 0) {
                    html += '<p style="text-align:center;color:#888;padding:20px;">ยังไม่มีประวัติการเล่น</p>';
                }
                html += '</div>';

                document.getElementById('detailContent').innerHTML = html;

            } catch (error) {
                document.getElementById('detailContent').innerHTML = `<p style="color:#ff6b6b;padding:20px;">เกิดข้อผิดพลาด: ${error.message}</p>`;
            }
        }

        function printReport() {
            const content = document.getElementById('detailContent').innerHTML;
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = content;
            // Show all level details for print
            printArea.querySelectorAll('.level-words').forEach(el => el.style.display = 'block');
            // Hide close/print buttons in print
            printArea.querySelectorAll('.close-btn, .btn-print, .profile-actions').forEach(el => el.style.display = 'none');
            printArea.style.display = 'block';
            document.querySelector('.header').style.display = 'none';
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.detail-overlay').style.display = 'none';
            window.print();
            // Restore
            setTimeout(() => {
                printArea.style.display = 'none';
                document.querySelector('.header').style.display = '';
                document.querySelector('.container').style.display = '';
                document.querySelector('.detail-overlay').style.display = '';
                document.getElementById('detailOverlay').classList.add('active');
            }, 500);
        }

        async function loadTeacherInfo() {
            try {
                const profile = await gameAPI.getUserProfile();
                document.getElementById('teacherName').textContent = profile.displayName || profile.username;
                document.getElementById('loginTime').textContent = new Date().toLocaleString('th-TH', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
            } catch (e) {
                console.error('Load teacher info error:', e);
            }
        }

        async function recalculateScores() {
            const btn = document.getElementById('recalcBtn');
            btn.disabled = true;
            btn.textContent = '⏳ กำลังคำนวณ...';
            try {
                const result = await gameAPI.recalculateScores();
                btn.textContent = `✅ อัปเดตแล้ว ${result.updated} คน`;
                // รีโหลดข้อมูลนักเรียนใหม่
                await loadStudents();
            } catch (error) {
                btn.textContent = '❌ ' + (error.message || 'เกิดข้อผิดพลาด');
            }
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = '🔄 คำนวณคะแนนใหม่';
            }, 3000);
        }

        function closeDetail() { document.getElementById('detailOverlay').classList.remove('active'); }

        function logout() {
            localStorage.removeItem('authToken');
            window.location.href = 'index1.html';
        }
    </script>
</body>
</html>
